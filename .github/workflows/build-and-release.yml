name: Build and Release

permissions:
  contents: write
  actions: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to build'
        required: true
        default: 'main'
        type: string
      release_tag:
        description: 'Release tag to publish, for example v2.1.25'
        required: true
        type: string
      draft:
        description: 'Create release as draft'
        required: false
        default: true
        type: boolean

env:
  BUN_INSTALL_REGISTRY: 'https://registry.npmjs.org/'

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run postinstall
        run: bun run postinstall || true

      - name: Run ESLint
        run: bun run lint

      - name: Check Prettier formatting
        run: bun run format:check

      - name: TypeScript type check
        run: bunx tsc --noEmit

      - name: Run unit tests
        run: bunx vitest run

  build-pipeline:
    name: Build Pipeline
    uses: ./.github/workflows/_build-reusable.yml
    needs: code-quality
    if: needs.code-quality.result == 'success'
    with:
      skip_code_quality: true
      require_macos_distribution_signing: true
      ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      matrix: >-
        {"include":[
          {"platform":"macos-arm64","os":"macos-14","command":"node scripts/build-with-builder.js arm64 --mac --arm64","artifact-name":"macos-build-arm64","arch":"arm64"},
          {"platform":"macos-x64","os":"macos-14","command":"node scripts/build-with-builder.js x64 --mac --x64","artifact-name":"macos-build-x64","arch":"x64"},
          {"platform":"windows-x64","os":"windows-2022","command":"node scripts/build-with-builder.js x64 --win --x64","artifact-name":"windows-build-x64","arch":"x64"},
          {"platform":"windows-arm64","os":"windows-11-arm","command":"node scripts/build-with-builder.js arm64 --win --arm64","artifact-name":"windows-build-arm64","arch":"arm64"},
          {"platform":"linux-x64","os":"ubuntu-latest","command":"node scripts/build-with-builder.js x64 --linux --x64","artifact-name":"linux-build-x64","arch":"x64"},
          {"platform":"linux-arm64","os":"ubuntu-24.04-arm","command":"node scripts/build-with-builder.js arm64 --linux --arm64","artifact-name":"linux-build-arm64","arch":"arm64"}
        ]}
    secrets: inherit

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-pipeline]
    if: needs.build-pipeline.result == 'success'
    environment: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Get version for release
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.release_tag }}"
          else
            echo "::error::Release workflow requires a tag push or workflow_dispatch release_tag."
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: build-artifacts

      - name: Prepare release assets (normalize updater metadata)
        shell: bash
        run: bash scripts/prepare-release-assets.sh build-artifacts release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.tag_name }}
          files: |
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.dmg
            release-assets/**/*.deb
            release-assets/**/*.zip
            release-assets/**/*.yml
          generate_release_notes: true
          draft: ${{ github.event_name != 'workflow_dispatch' || inputs.draft }}
          prerelease: ${{ contains(steps.version.outputs.tag_name, 'beta') || contains(steps.version.outputs.tag_name, 'alpha') || contains(steps.version.outputs.tag_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
