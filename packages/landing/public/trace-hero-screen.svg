<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1935 1071" role="img" aria-labelledby="title desc">
  <title id="title">Trace agent workspace preview</title>
  <desc id="desc">A simplified Trace workspace with agent activity, approval controls, and project files.</desc>
  <defs>
    <linearGradient id="appBg" x1="0" x2="1935" y1="0" y2="1071" gradientUnits="userSpaceOnUse">
