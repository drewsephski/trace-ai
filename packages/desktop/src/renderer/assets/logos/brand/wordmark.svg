<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 76" role="img" aria-labelledby="title desc">
  <title id="title">Trace wordmark</title>
  <desc id="desc">Premium Trace wordmark with a small green signal point.</desc>
  <defs>
    <linearGradient id="trace-word" x1="8" y1="12" x2="238" y2="68" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="0.5" stop-color="#eef4ef" />
      <stop offset="1" stop-color="#aeb9b2" />
    </linearGradient>
    <radialGradient id="trace-point" cx="42%" cy="32%" r="68%">
      <stop offset="0" stop-color="#d8ffe6" />
      <stop offset="0.46" stop-color="#63eba0" />
      <stop offset="1" stop-color="#1f7a4b" />
    </radialGradient>
    <filter id="point-glow" x="-220%" y="-220%" width="540%" height="540%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.25 0 0 0 0 0.88 0 0 0 0 0.56 0 0 0 0.7 0"
        result="coloredBlur"
      />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <text
    x="0"
    y="58"
    fill="url(#trace-word)"
    font-family="Avenir Next, Inter, Segoe UI, Arial, sans-serif"
    font-size="74"
    font-weight="700"
    letter-spacing="-4.7"
  >
    trace
  </text>
  <circle cx="246" cy="18" r="5.5" fill="url(#trace-point)" filter="url(#point-glow)" />
</svg>
